name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site with clean URLs
        run: |
          set -e
          SRC=personal-website
          rm -rf site
          mkdir -p site

          # Shared assets at the root.
          cp -r "$SRC/assets" site/assets

          # Copy NLP research brief report with all dependencies.
          cp -r public/reports/nlp-textual-analysis site/
          mv site/nlp-textual-analysis/nlp-textual-analysis-accounting-finance.html site/nlp-textual-analysis/index.html

          # Copy AI digital transformation research brief.
          cp -r public/reports/ai-digital-transformation site/
          mv site/ai-digital-transformation/index.html site/ai-digital-transformation/index.html 2>/dev/null || true

          # Copy blockchain and cryptocurrency research brief.
          cp -r public/reports/blockchain-crypto site/
          mv site/blockchain-crypto/index.html site/blockchain-crypto/index.html 2>/dev/null || true

          # Copy cybersecurity risk disclosure research brief.
          cp -r public/reports/cybersecurity-risk-disclosure site/
          mv site/cybersecurity-risk-disclosure/index.html site/cybersecurity-risk-disclosure/index.html 2>/dev/null || true

          # Copy NZ tourism nowcasting research brief.
          cp -r public/reports/nz-tourism-nowcasting site/
          mv site/nz-tourism-nowcasting/index.html site/nz-tourism-nowcasting/index.html 2>/dev/null || true

          # Copy downloadable data files.
          mkdir -p site/data
          cp public/data/*.csv site/data/ 2>/dev/null || true
          cp public/data/*.txt site/data/ 2>/dev/null || true
          cp public/data/*.py  site/data/ 2>/dev/null || true

          # Rewrite relative links into clean absolute URLs.
          # ../pages/<name>.html  -> /<name>/   (index.html -> /)
          # ../assets/            -> /assets/
          rewrite() {
            sed \
              -e 's|\.\./pages/index\.html|/|g' \
              -e 's|\.\./pages/research\.html|/research/|g' \
              -e 's|\.\./pages/data-code\.html|/data-code/|g' \
              -e 's|\.\./pages/insights\.html|/insights/|g' \
              -e 's|\.\./pages/article\.html|/article/|g' \
              -e 's|\.\./pages/contact\.html|/contact/|g' \
              -e 's|\.\./assets/|/assets/|g' \
              "$1"
          }

          # Home page at the root.
          rewrite "$SRC/pages/index.html" > site/index.html

          # Section pages as /<name>/index.html for clean URLs.
          for name in research data-code insights article contact; do
            mkdir -p "site/$name"
            rewrite "$SRC/pages/$name.html" > "site/$name/index.html"
          done

          # 404 falls back to the home page.
          cat > site/404.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/">
            <title>Not found</title>
          </head>
          <body>
            <p>Page not found. <a href="/">Return home</a>.</p>
          </body>
          </html>
          HTML

          # Preserve the custom domain.
          if [ -f public/CNAME ]; then
            cp public/CNAME site/CNAME
          fi

          # Serve files as-is (no Jekyll processing).
          touch site/.nojekyll

          echo "Assembled site:"
          find site -maxdepth 2 -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
